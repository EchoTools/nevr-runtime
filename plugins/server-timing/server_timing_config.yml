# server_timing — CPU optimization for EchoVR dedicated servers.
#
# Hooks CPrecisionSleep::Wait to replace the engine's busy-wait timing
# with a simple Sleep(ms). Supports dynamic tick rate: low Hz in lobby,
# full Hz during matches. Reduces idle server CPU from ~91% to ~0%.
#
# Place this file next to server_timing.dll in the plugins/ directory.

# In-game tick rate (microseconds = 1000000 / hz)
tick_rate_hz: 120

# Idle/lobby tick rate — servers in lobby with no active match run at
# this rate to save CPU. Switches to tick_rate_hz when a match starts.
tick_rate_idle_hz: 6

# Replace CPrecisionSleep::BusyWait with a RET instruction.
# The busy-wait spin loop burns CPU waiting for the next tick.
# Safe on both Wine and native Windows.
disable_busywait: true

# Fix float comparison in delta time calculation that causes the engine
# to occasionally skip ticks due to floating-point precision issues.
fix_deltatime_comparison: true

# Hook SwitchToThread to yield properly on Wine.
# WARNING: Disabled — Sleep(0)/Sleep(1) on Wine break SRW locks and
# condition variables. See docs/server-hardening/08-task-scheduler-spin-analysis.md
fix_switchtothread: false
