# Gun2CR Visual Effects Fix - Configuration File
# =============================================================================
# This file configures the Gun2CR visual fix hook.
# Reference: evr-reconstruction/docs/hooks/gun2cr_visual_fix_hook.md
#
# SETUP INSTRUCTIONS:
# -------------------
# 1. Copy this file to the game directory (same folder as echovr.exe)
# 2. Ensure DbgHooks.dll is loaded by the game
# 3. Fire the standard GunCR weapon in-game
# 4. Check gun2cr_hook.log for "GUNCR REFERENCE VALUES" section
# 5. Copy the suggested values below into [GunCR_Reference] section
# 6. Set enabled = true
# 7. Restart the game
# 8. Fire Gun2CR weapon - visual effects should now work!
#
# EXTRACTION MODE vs PATCHING MODE:
# ----------------------------------
# - If enabled = false: Hook runs in EXTRACTION MODE
#   - Logs GunCR reference values when you fire GunCR weapon
#   - Gun2CR bullets are logged but NOT patched
#   - Use this mode to capture the reference values
#
# - If enabled = true: Hook runs in PATCHING MODE
#   - Gun2CR bullets are automatically fixed at runtime
#   - Uses the values configured below
#   - Check gun2cr_hook.log to verify patches are applied
#
# =============================================================================

[GunCR_Reference]
# Enable/disable patching (set to true after extracting values)
enabled = false

# Trail duration in seconds (typically 0.5 - 1.0)
# This fixes the "divide by zero" error in visual scripts
trailduration = 0.0

# Primary bullet trail particle effect (64-bit hash)
# Example: 0x1234567890ABCDEF
trailpfx = 0x0

# Secondary trail overlay/glow effect (64-bit hash)
trailpfx_b = 0x0

# Impact particle effect (64-bit hash)
collisionpfx = 0x0

# Secondary impact particles (smoke/debris) (64-bit hash)
collisionpfx_b = 0x0

# Visual effect flags (32-bit bitfield)
# Should include: USE_IMPACT | TRAIL_SCALES_WITH_DAMAGE | UPDATE_TRAIL_LENGTH | KILL_TRAIL_ON_COLLISION
# Example: 0x2C40
flags = 0x0

# =============================================================================
# EXAMPLE CONFIGURATION (PLACEHOLDER VALUES - REPLACE WITH ACTUAL)
# =============================================================================
# After extracting GunCR reference values, your config should look like:
#
# [GunCR_Reference]
# enabled = true
# trailduration = 0.8
# trailpfx = 0x1234567890ABCDEF
# trailpfx_b = 0x234567890ABCDEF0
# collisionpfx = 0x34567890ABCDEF01
# collisionpfx_b = 0x4567890ABCDEF012
# flags = 0x2C40
#
# =============================================================================

[Logging]
# Additional logging options can be added here in the future
# For now, logging is always enabled when hook is loaded

# =============================================================================
# TROUBLESHOOTING
# =============================================================================
#
# Gun2CR still has no visual effects:
#   1. Check gun2cr_hook.log exists (same folder as echovr.exe)
#   2. Verify hook is being called (should see log entries when firing)
#   3. Ensure enabled = true in config
#   4. Verify all hash values are non-zero
#   5. Check BEFORE/AFTER dumps in log to confirm patch is applied
#
# Hook not loading:
#   1. Ensure DbgHooks.dll is in the correct directory
#   2. Check game console/logs for "[Gun2CR] Hook initialized" message
#   3. Verify game version is correct (34.4.631547.1)
#
# GunCR reference values not appearing in log:
#   1. Ensure enabled = false (extraction mode)
#   2. Fire the standard GunCR weapon (not Gun2CR)
#   3. Check gun2cr_hook.log for "GUNCR REFERENCE VALUES" section
#   4. Values should appear immediately after firing
#
# =============================================================================
# For more help, see: evr-reconstruction/docs/hooks/gun2cr_visual_fix_hook.md
# =============================================================================
